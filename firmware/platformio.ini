[env:esp32dev]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
; Bluetooth wordt per ongeluk gekozen. Sluit ESP32 aan via USB, run 'pio device list',
; en uncomment upload_port hieronder met jouw poort (bijv. /dev/cu.usbserial-0001)
; upload_port = /dev/cu.usbserial-0001
lib_deps = 
    adafruit/Adafruit MAX31865 library@^1.2.0
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/tzapu/WiFiManager.git
    ricmoo/QRCode
    knolleary/PubSubClient@^2.8
    emelianov/modbus-esp8266@^4.0.0
build_flags = 
    -DCORE_DEBUG_LEVEL=3
; Lagere snelheid = stabieler bij "device disconnected or multiple access" errors
upload_speed = 115200

; LilyGO T-SIM7670G S3 (ESP32-S3 + SIM7670G) — https://lilygo.cc/products/t-sim-7670g-s3
; Build: pio run -e lilygo-t-sim7670g-s3
; Pinout: zie firmware/README.md sectie T-SIM7670G S3
[env:lilygo-t-sim7670g-s3]
platform = espressif32@6.7.0
; DevKitC-achtige variant (geen vaste I2C-pinnen in pins_arduino.h die met onze defines botsen)
board = esp32-s3-devkitc-1
framework = arduino
; LilyGO T-SIM7670G S3: 16 MB flash + OPI PSRAM (niet 8 MB DevKitC-default — anders flash verify error)
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
monitor_speed = 115200
; 115200: na stub faalt 460800 vaak op USB-CDC ("No serial data received")
upload_speed = 115200
; Overschrijf DevKitC 8MB — LilyGO T-SIM7670G S3 = 16 MB flash (verify-fout bij verkeerde size)
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
lib_deps =
    adafruit/Adafruit MAX31865 library@^1.2.0
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/tzapu/WiFiManager.git
    ricmoo/QRCode
    knolleary/PubSubClient@^2.8
    emelianov/modbus-esp8266@^4.0.0
extra_scripts = pre:scripts/pio_lilygo_upload.py
build_flags =
    -DBOARD_LILYGO_T_SIM7670G_S3=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; Zelfde hardware als hierboven maar LilyGO "Standard" pinmap (BAT=GPIO8, VIN/solar=GPIO18). Zie board_pins.h.
[env:lilygo-t-sim7670g-s3-standard]
extends = env:lilygo-t-sim7670g-s3
build_flags =
    ${env:lilygo-t-sim7670g-s3.build_flags}
    -DBOARD_LILYGO_T_SIM7670G_S3_STANDARD=1

[env:lilygo-t-sim7670g-s3-release]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
monitor_speed = 115200
upload_speed = 115200
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
lib_deps =
    adafruit/Adafruit MAX31865 library@^1.2.0
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/tzapu/WiFiManager.git
    ricmoo/QRCode
    knolleary/PubSubClient@^2.8
    emelianov/modbus-esp8266@^4.0.0
extra_scripts = pre:scripts/pio_lilygo_upload.py
build_flags =
    -DBOARD_LILYGO_T_SIM7670G_S3=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -O2

[env:lilygo-t-sim7670g-s3-standard-release]
extends = env:lilygo-t-sim7670g-s3-release
build_flags =
    ${env:lilygo-t-sim7670g-s3-release.build_flags}
    -DBOARD_LILYGO_T_SIM7670G_S3_STANDARD=1

[env:esp32dev-release]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    adafruit/Adafruit MAX31865 library@^1.2.0
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/tzapu/WiFiManager.git
    ricmoo/QRCode
    knolleary/PubSubClient@^2.8
    emelianov/modbus-esp8266@^4.0.0
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -O2
upload_speed = 115200
