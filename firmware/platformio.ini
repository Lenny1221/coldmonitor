; Intellifrost firmware — Carrier-PCB v1.1 (JLCPCB)
; Hardware: LilyGO T-SIM7670G S3 op carrier-board v1.1
; De oude SimShield / "Standard" / ESP32-DevKit paden zijn verwijderd.
; Zie firmware/src/board_pins.h en firmware/src/pins_carrier.h voor de pinout.

[env:lilygo-t-sim7670g-s3]
platform = espressif32@6.7.0
; DevKitC-achtige variant (geen vaste I2C-pinnen in pins_arduino.h die met onze defines botsen)
board = esp32-s3-devkitc-1
framework = arduino
; LilyGO T-SIM7670G S3: 16 MB flash + OPI PSRAM (niet 8 MB DevKitC-default — anders flash verify error)
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
monitor_speed = 115200
; 921600 met stub-mode: schrijft de hele app in ~6 s. Vereist om binnen
; het ~10 s TPL5010-watchdog-window van de carrier te blijven (anders
; reset de TPL5010 het bord midden in de download-mode en mislukt de flash
; met `errno 6`/`Serial data stream stopped`).
; Eerdere comment "460800 faalt op USB-CDC" gold met --no-stub. Met de
; standaard stub en hardware-reset via RTS-pin (default_reset) loopt de
; flash stabiel op 921600.
upload_speed = 921600
; Overschrijf DevKitC 8MB — LilyGO T-SIM7670G S3 = 16 MB flash (verify-fout bij verkeerde size)
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
lib_deps =
    adafruit/Adafruit MAX31865 library@^1.2.0
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/tzapu/WiFiManager.git
    ricmoo/QRCode
    knolleary/PubSubClient@^2.8
    emelianov/modbus-esp8266@^4.0.0
; pio_lilygo_upload.py vervangt de standaard UPLOADCMD door één die
; ALLEEN de app (0x10000) schrijft op 921600 baud. Dat past binnen het
; ~10 s TPL5010-watchdog-window en omzeilt het USB-CDC change-baud-bug
; dat optreedt zodra er al firmware op het bord draait.
; Voor first-time provisioning (lege flash) gebruik:
;     FORCE_FULL_UPLOAD=1 pio run -t upload
extra_scripts = post:scripts/pio_lilygo_upload.py
build_flags =
    -DBOARD_LILYGO_T_SIM7670G_S3=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

[env:lilygo-t-sim7670g-s3-release]
extends = env:lilygo-t-sim7670g-s3
build_flags =
    -DBOARD_LILYGO_T_SIM7670G_S3=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -O2

; Diag-build: kickt de TPL5010 NIET. Enige overgebleven diag-env: bewijst dat
; het resetmoment hardware-bepaald is (TPL5010 RST → EN), niet software.
; Als het reset-moment gelijk blijft (~10 s) bij deze build → GPIO 4 pulses
; bereiken de TPL5010 sowieso niet. Zie watchdog_tpl5010.cpp voor details.
[env:lilygo-t-sim7670g-s3-diag-no-kick]
extends = env:lilygo-t-sim7670g-s3
build_flags =
    -DBOARD_LILYGO_T_SIM7670G_S3=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DWDT_DISABLE_KICK=1
